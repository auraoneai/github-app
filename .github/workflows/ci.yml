name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - name: Install (skip @auraone/sdk linking issues for now)
        run: npm install --no-package-lock || true
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
